{% extends "base.html" %}

{% block content %}

<div class="tz-auth">

  <!-- ================= HEADER ================= -->
  <div class="tz-auth__header">
    <h1 class="tz-auth__title">
      {{ t("auth.otp_title") }}
    </h1>

    <p class="tz-auth__subtitle">
      {{ t("auth.otp_sent_to") }}
      <span class="tz-strong">{{ email }}</span>
    </p>
  </div>

  <!-- ================= CARD ================= -->
  <div class="tz-auth-card">

    <form method="post" id="otp-form" data-tz-form>

      <!-- INPUT -->
      <div class="tz-field">

        <label class="tz-label" for="code">
          {{ t("auth.otp_label") }}
        </label>

        <input
          id="code"
          name="code"
          class="tz-input tz-otp__input{% if error %} tz-input--error{% endif %}"
          placeholder="{{ t('auth.otp_placeholder') }}"
          inputmode="numeric"
          autocomplete="one-time-code"
          pattern="[0-9]*"
          maxlength="6"
          data-tz-otp
          autofocus
          required
        />

        {% if error %}
        <div class="tz-help tz-help--error">
          {{ t("auth.otp_invalid") }}
        </div>
        {% else %}
        <div class="tz-help tz-help--muted">
          {{ t("auth.otp_help") }}
        </div>
        {% endif %}

      </div>

      <!-- CHANGE EMAIL -->
      <div class="tz-resend" style="margin-top:15px;">
        <a class="tz-link-btn" href="{{ url_for('auth.login') }}">
          {{ t("auth.change_email") }}
        </a>
      </div>

    </form>

  </div>

  <!-- ================= FIXED BUTTON ================= -->
  <div class="tz-auth-submit-fixed">
    <button type="submit" form="otp-form" class="tz-primary-btn">
      {{ t("common.continue") }}
    </button>
  </div>

</div>

<!-- ================= JS ================= -->

<script src="{{ url_for('static', filename='js/auth.js') }}"></script>

<script>
/* ---------------------------
OTP UX + Security
--------------------------- */

// 🔒 bloque retour arrière
history.replaceState(null, "", location.href);
window.addEventListener("popstate", () => {
  history.pushState(null, "", location.href);
});

// 🔄 reload si page restaurée (mobile cache)
window.addEventListener("pageshow", (event) => {
  if (event.persisted) {
    window.location.reload();
  }
});

// ⚡ auto-submit si 6 chiffres
document.addEventListener("input", function (e) {
  if (e.target.matches("[data-tz-otp]")) {
    if (e.target.value.length === 6) {
      document.getElementById("otp-form").submit();
    }
  }
});

// 🎯 micro animation focus
const input = document.querySelector("[data-tz-otp]");
if (input) {
  input.addEventListener("focus", () => {
    input.style.transition = "0.2s";
    input.style.transform = "scale(1.02)";
  });

  input.addEventListener("blur", () => {
    input.style.transform = "scale(1)";
  });
}
</script>

{% endblock %}
